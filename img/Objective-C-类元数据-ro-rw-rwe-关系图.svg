<text x="40" y="30" class="th">类元数据三结构体:编译期 → realize → 动态修改</text>

<rect x="40" y="46" width="600" height="58" rx="10" class="panel"/>
<rect x="40" y="46" width="4" height="58" rx="0" fill="#58B2DC"/>
<text x="60" y="70" class="tc">objc_class · bits.data()</text>
<text x="60" y="90" class="ts">编译产物里 bits 初始指向 ro;首次使用触发 realize 后才指向 rw</text>

<rect x="60" y="130" width="220" height="170" rx="10" class="box roStroke"/>
<rect x="60" y="130" width="220" height="30" rx="10" class="roFill"/>
<rect x="60" y="150" width="220" height="10" class="roFill"/>
<text x="76" y="150" class="tc">class_ro_t</text>
<text x="200" y="150" class="accT" fill="#3a93c4">编译期只读</text>
<text x="76" y="180" class="ts">__DATA_CONST · 进程间可共享</text>
<text x="76" y="202" class="tm">instanceSize / instanceStart</text>
<text x="76" y="222" class="tm">flags · name · ivars</text>
<text x="76" y="242" class="tm">baseMethods</text>
<text x="76" y="262" class="tm">baseProtocols</text>
<text x="76" y="282" class="tm">baseProperties</text>

<rect x="360" y="130" width="280" height="170" rx="10" class="box rwStroke"/>
<rect x="360" y="130" width="280" height="30" rx="10" class="rwFill"/>
<rect x="360" y="150" width="280" height="10" class="rwFill"/>
<text x="376" y="150" class="tc">class_rw_t</text>
<text x="556" y="150" class="accT" fill="#E58522">运行期可写</text>
<text x="376" y="180" class="ts">realize 时分配 · 承载动态性</text>
<text x="376" y="202" class="tm">flags · witness · index</text>
<text x="376" y="222" class="tm">firstSubclass / nextSiblingClass</text>
<rect x="376" y="236" width="248" height="50" rx="8" fill="var(--intensity-6,rgba(0,0,0,.06))" stroke="#E58522" stroke-width=".5"/>
<text x="388" y="256" class="tc">ro_or_rw_ext</text>
<text x="388" y="275" class="ts">PointerUnion · 低位 tag 二选一</text>

<path d="M285 215 L355 215" class="arr"/>
<text x="292" y="208" class="ts">持有</text>

<rect x="40" y="340" width="600" height="380" rx="10" class="dash" fill="none"/>
<text x="56" y="362" class="th">ro_or_rw_ext 的惰性升级(三态)</text>

<rect x="60" y="380" width="260" height="120" rx="10" class="box"/>
<rect x="60" y="380" width="6" height="120" rx="0" fill="#58B2DC"/>
<text x="80" y="404" class="th">① 未升级(绝大多数类)</text>
<text x="80" y="426" class="ts">tag = class_ro_t*</text>
<text x="80" y="448" class="tm">ro_or_rw_ext 直接 = ro</text>
<text x="80" y="470" class="ts">不分配 rwe,零额外内存</text>
<text x="80" y="490" class="tm">methods() → ro-&gt;baseMethods</text>

<rect x="380" y="380" width="260" height="120" rx="10" class="box rweStroke"/>
<rect x="380" y="380" width="6" height="120" rx="0" fill="#86C166"/>
<text x="400" y="404" class="th">② 已升级(被动态改过)</text>
<text x="400" y="426" class="ts">tag = class_rw_ext_t*</text>
<text x="400" y="448" class="tm">ro_or_rw_ext = rwe</text>
<text x="400" y="470" class="tm">rwe-&gt;ro 保存原 ro</text>
<text x="400" y="490" class="tm">methods() → rwe-&gt;methods(array)</text>

<path d="M322 440 L376 440" class="accent"/>
<text x="318" y="432" class="accT" fill="#E58522" text-anchor="middle">extAlloc</text>
<text x="349" y="525" class="ts" text-anchor="middle">触发:attach category · class_addMethod · 加属性</text>

<rect x="380" y="556" width="260" height="120" rx="10" class="box rweStroke"/>
<rect x="380" y="556" width="6" height="120" rx="0" fill="#86C166"/>
<text x="400" y="580" class="tc">class_rw_ext_t</text>
<text x="588" y="580" class="accT" fill="#5a8f3e">可变副本区</text>
<text x="400" y="604" class="tm">ro(原只读蓝图)</text>
<text x="400" y="626" class="tm">methods   : method_array_t</text>
<text x="400" y="648" class="tm">properties: property_array_t</text>
<text x="400" y="668" class="tm">protocols : protocol_array_t</text>

<path d="M510 502 L510 552" class="accent"/>
<text x="518" y="530" class="ts">指向</text>

<rect x="60" y="556" width="260" height="120" rx="10" class="panel"/>
<text x="80" y="580" class="th">ro() 读取逻辑</text>
<text x="80" y="604" class="tm">if slowpath(is rwe)</text>
<text x="96" y="624" class="tm">return rwe-&gt;ro</text>
<text x="80" y="644" class="tm">else</text>
<text x="96" y="664" class="tm">return 自身即 ro</text>

